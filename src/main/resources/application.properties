spring.application.name=Jun-shops

//server.port=9193
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/jun_shops_db
spring.datasource.username=root
spring.datasource.password=admin

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# ----------------------------
# JPA / Hibernate
# ----------------------------
spring.jpa.properties.hibernate.dialect= org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
##(create, update, create-drop, validate)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Enable DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Vaadin hot reload
vaadin.frontend.hotdeploy=true

api.prefix=/api/v1
# REST API base URL (for internal calls)
api.base-url=http://localhost:8080


# ----------------------------
# JWT
# ----------------------------
auth.token.expirationInMils=3600000
auth.token.jwtSecret= 36763979244226452948404D635166546A576D5A7134743743777217A25432A462D
# ----------------------------
# Vaadin Configuration
# ----------------------------

vaadin.launch-browser=true
vaadin.productionMode=false
# Enable development mode for hot reload
vaadin.pnpm.enable=true